# Fonts
disable_ligatures always
font_family       FiraCode Nerd Font Mono Ret
font_size         9

# Scrollback
scrollback_lines 10000
scrollback_pager_history_size 2048
scrollback_pager nvim --cmd 'set eventignore=FileType' +'call nvim_open_term(0, {})' +'set nomodified nolist' +'$' -

# Cursor
cursor_stop_blinking_after 0

# Terminal bell
visual_bell_duration 0.25

# Window layout
enabled_layouts     grid,tall,stack
inactive_text_alpha 0.5
placement_strategy  top-left

# Tab bar
tab_bar_edge        top
tab_bar_style       slant
tab_title_template "{index}: {fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{tab.active_wd.split('/')[-1]}"

# Remote control via a socket
# https://sw.kovidgoyal.net/kitty/remote-control/#remote-control-via-a-socket
allow_remote_control socket-only
listen_on unix:/tmp/kitty

# Environment
# GUI launches on macOS start kitty with a minimal PATH, so add the nix profile
# bin dir to reach tools like fzf from kittens and launched programs.
env PATH=/etc/profiles/per-user/kdoan/bin:${PATH}

# Include additional files
globinclude kitty.d/*.conf
